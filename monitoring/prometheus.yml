global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node_exporter'
    static_configs:
      - targets: ['host.docker.internal:9100'] # windows/mac docker host mapping

  - job_name: 'backend_services'
    metrics_path: /metrics
    static_configs:
      - targets:
          - 'host.docker.internal:8000'
          - 'host.docker.internal:8001'
          # añade aquí otros: 'host.docker.internal:8002', 'host.docker.internal:8003', ...
